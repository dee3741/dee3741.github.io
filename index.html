<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="style.css">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            min-height: 100vh;
        }

        #dust-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 3;
            overflow: hidden;
        }

        .dust-particle {
            position: absolute;
            left: var(--x);
            top: var(--y);
            width: var(--size);
            height: var(--size);
            border-radius: 999px;
            background: rgba(244, 236, 214, var(--alpha));
            box-shadow: 0 0 var(--glow) rgba(244, 236, 214, calc(var(--alpha) * 0.9));
            filter: blur(var(--blur));
            animation: dust-float var(--duration) linear infinite;
            animation-delay: var(--delay);
            transform: translate3d(0, 0, 0);
        }

        .video-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            height: 100svh;
        }

        .status-panel,
        #hand-indicator {
            position: relative;
            z-index: 4;
        }

        .status-panel {
            position: fixed;
            left: 20px;
            bottom: 20px;
            width: min(350px, calc(100vw - 40px));
            max-height: calc(100svh - 40px);
            gap: 10px;
        }

        .animation-container {
            max-height: min(150px, calc(100svh - 120px));
        }

        .message-compose {
            min-height: 48px;
        }

        @keyframes dust-float {
            from {
                transform: translate3d(0, 16px, 0);
            }
            to {
                transform: translate3d(var(--drift), -110vh, 0);
            }
        }

        @media (max-width: 640px) {
            .status-panel {
                left: 16px;
                right: 16px;
                bottom: 16px;
                width: auto;
                max-height: calc(100svh - 32px);
            }

            .animation-container {
                max-height: min(140px, calc(100svh - 108px));
            }
        }
    </style>
    <title>afk</title>
</head>
<body>

        <!-- Replace 'your-sound.mp3' with the actual file name and path -->
        <source src="sources/message.mp3" type="audio/mp3">

    </audio>
    <audio id="mumukSound" preload="auto">

    </audio>
    <audio id="deeSound" preload="auto">
        <source src="sources/dee-sound.mp3" type="audio/mpeg">

    </audio>

<div class="video-container">
        <canvas id="d-canvas"></canvas>
    </div>
<div id="dust-layer" aria-hidden="true"></div>

<div class="status-panel">
    <div class="animation-container">
        <p id="status" class="fade-in-text system-status">
            <span id="timestamp" class="timestamp-text"></span>
            You are now away: AFK<span class="blinking-cursor"> ></span>
        </p>

        <button class="message-send" type="submit">send</button>

<script type="importmap">{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "opentype": "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.module.js",
    "gltf-loader": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js",
    "draco-loader": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/DRACOLoader.js",
    "ktx2-loader": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/KTX2Loader.js"
  }
}</script>

<script type="module">
import * as THREE from 'three';
import * as opentype from 'opentype';
import { GLTFLoader } from 'gltf-loader';
import { DRACOLoader } from 'draco-loader';
import { KTX2Loader } from 'ktx2-loader';

const canvas = document.getElementById('d-canvas');
const baseCanvasScale = 0.35;
const deeCanvasMultiplier = 2;
const deeModelScaleMultiplier = 2;

function getCanvasSize(modelName = currentModelName) {
    const multiplier = modelName === 'dee374' ? deeCanvasMultiplier : 1;
    return Math.min(window.innerWidth, window.innerHeight) * baseCanvasScale * multiplier;
}

function applyCanvasSize(modelName = currentModelName) {
    const nextSize = getCanvasSize(modelName);
    canvas.width = nextSize;
    canvas.height = nextSize;
    canvas.style.width = `${nextSize}px`;
    canvas.style.height = `${nextSize}px`;
    renderer.setSize(nextSize, nextSize, false);
}

const size = getCanvasSize('d');
canvas.width = size;
canvas.height = size;
canvas.style.width = `${size}px`;
canvas.style.height = `${size}px`;
canvas.style.display = 'block';

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(size, size);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 5;

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8A3F44, 1.0);
fillLight.position.set(-4, -2, 2);
scene.add(fillLight);

const gltfLoader = new GLTFLoader();
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/draco/');

const ktx2Loader = new KTX2Loader();
ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/libs/basis/');
ktx2Loader.detectSupport(renderer);

gltfLoader.setDRACOLoader(dracoLoader);
gltfLoader.setKTX2Loader(ktx2Loader);
const modelRoot = new THREE.Group();
scene.add(modelRoot);

let currentModelName = 'd';

function opentypePathToShapes(otPath) {
    const shapePath = new THREE.ShapePath();
    for (const cmd of otPath.commands) {
        switch (cmd.type) {
            case 'M': shapePath.moveTo(cmd.x, -cmd.y); break;
            case 'L': shapePath.lineTo(cmd.x, -cmd.y); break;
            case 'C': shapePath.bezierCurveTo(cmd.x1, -cmd.y1, cmd.x2, -cmd.y2, cmd.x, -cmd.y); break;
            case 'Q': shapePath.quadraticCurveTo(cmd.x1, -cmd.y1, cmd.x, -cmd.y); break;
            case 'Z': shapePath.currentPath.autoClose = true; break;
        }
    }
    return shapePath.toShapes(true);
}

function createFallbackDMesh() {
    const fallbackShape = new THREE.Shape();
    fallbackShape.moveTo(-1.1, -1.45);
    fallbackShape.lineTo(-1.1, 1.45);
    fallbackShape.lineTo(0.05, 1.45);
    fallbackShape.bezierCurveTo(1.15, 1.45, 1.95, 0.88, 2.22, 0);
    fallbackShape.bezierCurveTo(1.95, -0.88, 1.15, -1.45, 0.05, -1.45);
    fallbackShape.lineTo(-1.1, -1.45);

    const hole = new THREE.Path();
    hole.moveTo(-0.5, -0.85);
    hole.lineTo(-0.5, 0.85);
    hole.lineTo(0.02, 0.85);
    hole.bezierCurveTo(0.82, 0.85, 1.28, 0.42, 1.45, 0);
    hole.bezierCurveTo(1.28, -0.42, 0.82, -0.85, 0.02, -0.85);
    hole.lineTo(-0.5, -0.85);
    fallbackShape.holes.push(hole);

    const fallbackGeometry = new THREE.ExtrudeGeometry(fallbackShape, {
        depth: 0.85,
        bevelEnabled: true,
        bevelThickness: 0.14,
        bevelSize: 0.1,
        bevelSegments: 10,
        curveSegments: 48
    });
    fallbackGeometry.center();

    const fallbackMaterial = new THREE.MeshToonMaterial({
        color: 0x8A3F44
    });

    const mesh = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
    mesh.rotation.x = -0.08;
    mesh.rotation.y = -0.18;
    return mesh;
}

function clearModelRoot() {
    while (modelRoot.children.length) {
        const child = modelRoot.children.pop();
        modelRoot.remove(child);
    }
}

async function buildDModel() {
    try {
        const fontResponse = await fetch('./sources/edge.ttf');
        if (!fontResponse.ok) {
            throw new Error(`Font request failed with ${fontResponse.status}`);
        }

        const fontBuffer = await fontResponse.arrayBuffer();
        const font = opentype.parse(fontBuffer);
        const glyph = font.charToGlyph('D');
        const otPath = glyph.getPath(0, 0, 200);
        const shapes = opentypePathToShapes(otPath);

        const geometry = new THREE.ExtrudeGeometry(shapes, {
            depth: 30,
            bevelEnabled: true,
            bevelThickness: 3,
            bevelSize: 2,
            bevelSegments: 6,
            curveSegments: 16
        });

        geometry.computeBoundingBox();
        const center = new THREE.Vector3();
        geometry.boundingBox.getCenter(center);
        geometry.translate(-center.x, -center.y, -center.z);

        const bbox = geometry.boundingBox;
        const maxDim = Math.max(bbox.max.x - bbox.min.x, bbox.max.y - bbox.min.y);
        const scale = (4 / maxDim) * 0.75;
        geometry.scale(scale, scale, scale);

        geometry.computeBoundingBox();
        geometry.boundingBox.getCenter(center);
        geometry.translate(-center.x, -center.y, -center.z);

        const material = new THREE.MeshToonMaterial({
            color: 0x8A3F44
        });

        return new THREE.Mesh(geometry, material);
    } catch (error) {
        console.error('EDGE font render failed, falling back to simple D shape.', error);
        return createFallbackDMesh();
    }
}

async function loadMumukModel() {
    const gltf = await gltfLoader.loadAsync('./sources/mumuk-very-compressed.glb');
    const model = gltf.scene;
    normalizeImportedModelMaterials(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    const scale = 2.8 / maxDim;

    model.position.sub(center);
    model.scale.setScalar(scale);
    model.rotation.x = -0.08;
    model.rotation.y = -0.24;

    return model;
}

function normalizeImportedModelMaterials(model) {
    model.traverse((child) => {
        if (!child.isMesh || !child.material) {
            return;
        }

        const materials = Array.isArray(child.material) ? child.material : [child.material];
        materials.forEach((material) => {
            material.side = THREE.DoubleSide;
            material.transparent = false;
            material.opacity = 1;
            material.depthWrite = true;
            material.needsUpdate = true;
        });
    });
}

async function loadDeeModel() {
    const gltf = await gltfLoader.loadAsync('./sources/dee.glb');
    const model = gltf.scene;
    normalizeImportedModelMaterials(model);

    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    const maxDim = Math.max(size.x, size.y, size.z) || 1;
    const scale = (2.8 / maxDim) * 0.7 * deeModelScaleMultiplier;

    model.position.sub(center);
    model.scale.setScalar(scale);
    model.rotation.x = -0.08;
    model.rotation.y = -0.24;

    return model;
}

async function setDisplayedModel(modelName) {
    if (modelName === currentModelName && modelRoot.children.length) {
        return;
    }

    applyCanvasSize(modelName);
    clearModelRoot();

    if (modelName === 'mumuk') {
        const mumukModel = await loadMumukModel();
        modelRoot.add(mumukModel);
        currentModelName = 'mumuk';
        return;
    }

    if (modelName === 'dee374') {
        const deeModel = await loadDeeModel();
        modelRoot.add(deeModel);
        currentModelName = 'dee374';
        return;
    }

    const dModel = await buildDModel();
    modelRoot.add(dModel);
    currentModelName = 'd';
}

await setDisplayedModel('d');

let targetX = modelRoot.rotation.x;
let targetY = modelRoot.rotation.y;
let currentX = modelRoot.rotation.x;
let currentY = modelRoot.rotation.y;

window.handState = { pinching: false, targetRotX: currentX, targetRotY: currentY, currentRotX: currentX, currentRotY: currentY };
window.afkScene = { setDisplayedModel, getCurrentModelName: () => currentModelName };

document.addEventListener('mousemove', (e) => {
    if (!window.handState.pinching) {
        targetY = ((e.clientX / window.innerWidth) * 2 - 1) * 0.1;
        targetX = -((e.clientY / window.innerHeight) * 2 - 1) * 0.1;
    }
});

window.addEventListener('resize', () => {
    applyCanvasSize();
});

(function animate() {
    requestAnimationFrame(animate);
    if (window.handState.pinching) {
        targetX = window.handState.targetRotX;
        targetY = window.handState.targetRotY;
    }
    currentX += (targetX - currentX) * 0.06;
    currentY += (targetY - currentY) * 0.06;
    modelRoot.rotation.x = currentX;
    modelRoot.rotation.y = currentY;
    window.handState.currentRotX = currentX;
    window.handState.currentRotY = currentY;
    renderer.render(scene, camera);
})();
</script>

<script>
(() => {
    const dustLayer = document.getElementById('dust-layer');
    const bands = [
        { count: 18, size: [10, 22], alpha: [0.12, 0.22], blur: [10, 16], glow: [18, 34], duration: [34, 54], drift: [-40, 40] },
        { count: 28, size: [5, 11], alpha: [0.08, 0.16], blur: [4, 8], glow: [10, 18], duration: [44, 70], drift: [-28, 28] },
        { count: 40, size: [2, 5], alpha: [0.04, 0.1], blur: [0, 2], glow: [4, 10], duration: [52, 82], drift: [-18, 18] }
    ];

    function randomBetween(min, max) {
        return min + Math.random() * (max - min);
    }

    function buildDust() {
        dustLayer.replaceChildren();

        bands.forEach((band) => {
            for (let index = 0; index < band.count; index += 1) {
                const particle = document.createElement('span');
                const size = randomBetween(band.size[0], band.size[1]);
                particle.className = 'dust-particle';
                particle.style.setProperty('--x', `${randomBetween(0, 100)}vw`);
                particle.style.setProperty('--y', `${randomBetween(0, 100)}vh`);
                particle.style.setProperty('--size', `${size}px`);
                particle.style.setProperty('--alpha', randomBetween(band.alpha[0], band.alpha[1]).toFixed(3));
                particle.style.setProperty('--blur', `${randomBetween(band.blur[0], band.blur[1]).toFixed(1)}px`);
                particle.style.setProperty('--glow', `${randomBetween(band.glow[0], band.glow[1]).toFixed(1)}px`);
                particle.style.setProperty('--duration', `${randomBetween(band.duration[0], band.duration[1]).toFixed(1)}s`);
                particle.style.setProperty('--delay', `${(-randomBetween(0, band.duration[1])).toFixed(1)}s`);
                particle.style.setProperty('--drift', `${randomBetween(band.drift[0], band.drift[1]).toFixed(1)}px`);
                dustLayer.appendChild(particle);
            }
        });
    }

    buildDust();
    window.addEventListener('resize', buildDust);
})();
</script>

<script>
    const animationContainer = document.querySelector('.animation-container');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');
    const mumukSound = document.getElementById('mumukSound');
    const deeSound = document.getElementById('deeSound');

    document.getElementById('timestamp').innerHTML = `[${getCurrentTime()}]&nbsp;`;

    function getCurrentTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    }

    function escapeHtml(value) {
        return value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function playStatusSound() {
        const sound = document.getElementById('statusSound');
        sound.volume = 0.8;
        sound.play();
    }

    function stopMumukSound() {
        mumukSound.pause();
        mumukSound.currentTime = 0;
    }

    function playMumukSound() {
        stopMumukSound();
        mumukSound.volume = 0.3;
        mumukSound.play().catch((error) => {
            console.error('Could not play mumuk sound.', error);
        });
    }

    function stopDeeSound() {
        deeSound.pause();
        deeSound.currentTime = 0;
    }

    function playDeeSound() {
        stopDeeSound();
        deeSound.volume = 0.5;
        deeSound.play().catch((error) => {
            console.error('Could not play dee sound.', error);
        });
    }

    const awayMessageHtml = 'You are now away: AFK<span class="blinking-cursor"> ></span>';
    const activeMessage = 'You are no longer away.';
    const inactivityDelayMs = 20000;
    let inactivityTimeout;
    let isAway = true;

    function appendSystemMessage(message, allowHtml = false) {
        const newStatus = document.createElement('p');
        newStatus.className = 'fade-in-text system-status';
        const renderedMessage = allowHtml ? message : escapeHtml(message);
        newStatus.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${renderedMessage}`;
        animationContainer.appendChild(newStatus);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    function appendUserMessage(message) {
        const newMessage = document.createElement('p');
        newMessage.className = 'fade-in-text message-status';
        newMessage.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${escapeHtml(message)}`;
        animationContainer.appendChild(newMessage);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    function appendCommandMessage(message) {
        const newMessage = document.createElement('p');
        newMessage.className = 'fade-in-text system-status';
        newMessage.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${escapeHtml(message)}`;
        animationContainer.appendChild(newMessage);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    function scheduleAwayStatus() {
        clearTimeout(inactivityTimeout);
        inactivityTimeout = setTimeout(() => {
            if (isAway) {
                return;
            }

            appendSystemMessage(awayMessageHtml, true);
            isAway = true;
        }, inactivityDelayMs);
    }

    function markUserActive() {
        if (isAway) {
            appendSystemMessage(activeMessage);
            isAway = false;
        }

        scheduleAwayStatus();
    }

    messageInput.addEventListener('focus', function () {
        markUserActive();
    });

    messageInput.addEventListener('input', function () {
        markUserActive();
    });

    messageForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const message = messageInput.value.trim();
        if (!message) {
            return;
        }

        markUserActive();

        if (message === '/mumuk') {
            window.afkScene?.setDisplayedModel('mumuk')
                .then(() => {
                    stopDeeSound();
                    playMumukSound();
                    appendCommandMessage('Switched model: mumuk');
                })
                .catch(() => appendCommandMessage('Could not load mumuk.'));
            messageInput.value = '';
            messageInput.focus();
            return;
        }

        if (message === '/dee374') {
            window.afkScene?.setDisplayedModel('dee374')
                .then(() => {
                    stopMumukSound();
                    playDeeSound();
                    appendCommandMessage('Switched model: dee374');
                })
                .catch(() => appendCommandMessage('Could not load dee374.'));
            messageInput.value = '';
            messageInput.focus();
            return;
        }

        if (message === '/reset') {
            stopMumukSound();
            stopDeeSound();
            window.afkScene?.setDisplayedModel('d')
                .then(() => appendCommandMessage('Switched model: D'))
                .catch(() => appendCommandMessage('Could not switch back to D.'));
            messageInput.value = '';
            messageInput.focus();
            return;
        }

        appendUserMessage(message);
        messageInput.value = '';
        messageInput.focus();
    });
</script>

<!-- Hand tracking indicator -->
<div id="hand-indicator" style="
    position: fixed; bottom: 50px; right: 50px;
    font-family: 'Arial Narrow', sans-serif;
    font-size: 14px; color: #9b8f88;
    background: rgba(255,255,255,0.05);
    padding: 8px 14px; border-radius: 4px;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.4s;
">
    <span id="hand-dot" style="width:8px;height:8px;border-radius:50%;background:#9b8f88;display:inline-block;transition:background 0.2s;"></span>
    <span id="hand-label">camera off</span>
</div>

<!-- Hidden video for webcam -->
<video id="hand-video" style="display:none;" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
(function() {
    const indicator  = document.getElementById('hand-indicator');
    const dot        = document.getElementById('hand-dot');
    const label      = document.getElementById('hand-label');
    const videoEl    = document.getElementById('hand-video');

    function setStatus(state) {
        indicator.style.opacity = '1';
        if (state === 'off')      { dot.style.background = '#9b8f88'; label.textContent = 'camera off'; }
        if (state === 'ready')    { dot.style.background = '#9b8f88'; label.textContent = 'no hand'; }
        if (state === 'detected') { dot.style.background = '#deea4c'; label.textContent = 'hand detected'; }
        if (state === 'pinching') { dot.style.background = '#8A3F44'; label.textContent = 'pinching'; }
    }

    let wasPinching   = false;
    let pinchStartX   = 0, pinchStartY   = 0;
    let baseRotX      = 0, baseRotY      = 0;

    function getPinchMidpoint(lm) {
        return { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };
    }

    function onResults(results) {
        if (!window.handState) return;

        const lms = results.multiHandLandmarks;
        if (!lms || lms.length === 0) {
            window.handState.pinching = false;
            wasPinching = false;
            setStatus('ready');
            return;
        }

        const lm = lms[0];
        setStatus('detected');

        const dx = lm[4].x - lm[8].x;
        const dy = lm[4].y - lm[8].y;
        const pinchDist = Math.sqrt(dx * dx + dy * dy);
        const pinching  = pinchDist < 0.06;

        if (pinching) {
            setStatus('pinching');
            const mid = getPinchMidpoint(lm);
            if (!wasPinching) {
                pinchStartX = mid.x;
                pinchStartY = mid.y;
                baseRotX    = window.handState.currentRotX;
                baseRotY    = window.handState.currentRotY;
                wasPinching = true;
            }
            const sensitivity = 4;
            window.handState.targetRotX = baseRotX - (mid.y - pinchStartY) * sensitivity;
            window.handState.targetRotY = baseRotY - (mid.x - pinchStartX) * sensitivity;
            window.handState.pinching   = true;
        } else {
            if (wasPinching) wasPinching = false;
            window.handState.pinching = false;
        }
    }

    function init() {
        if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
            setTimeout(init, 200);
            return;
        }

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const cam = new Camera(videoEl, {
            onFrame: async () => { await hands.send({ image: videoEl }); },
            width: 320, height: 240
        });

        cam.start().then(() => setStatus('ready')).catch(() => setStatus('off'));
    }

    init();
})();
</script>

</body>
</html>
