const scene = new THREE.Scene();

scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8A3F44, 1.0);
fillLight.position.set(-4, -2, 2);
scene.add(fillLight);

function opentypePathToShapes(otPath) {
    const shapePath = new THREE.ShapePath();
    for (const cmd of otPath.commands) {
        switch (cmd.type) {
            case 'M': shapePath.moveTo(cmd.x, -cmd.y); break;
            case 'L': shapePath.lineTo(cmd.x, -cmd.y); break;
            case 'C': shapePath.bezierCurveTo(cmd.x1, -cmd.y1, cmd.x2, -cmd.y2, cmd.x, -cmd.y); break;
            case 'Q': shapePath.quadraticCurveTo(cmd.x1, -cmd.y1, cmd.x, -cmd.y); break;
            case 'Z': shapePath.currentPath.autoClose = true; break;
        }
    }
    return shapePath.toShapes(true);
}

const binaryStr = atob(FONT_B64);
const bytes = new Uint8Array(binaryStr.length);
for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);
const font = opentype.parse(bytes.buffer);
{
    const glyph = font.charToGlyph('D');
    const otPath = glyph.getPath(0, 0, 200);
    const shapes = opentypePathToShapes(otPath);

    const geometry = new THREE.ExtrudeGeometry(shapes, {
        depth: 30,
        bevelEnabled: true,
        bevelThickness: 3,
        bevelSize: 2,
        bevelSegments: 6,
        curveSegments: 16
    });

    geometry.computeBoundingBox();
    const center = new THREE.Vector3();
    geometry.boundingBox.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);

    const bbox = geometry.boundingBox;
    const maxDim = Math.max(bbox.max.x - bbox.min.x, bbox.max.y - bbox.min.y);
    const scale = (4 / maxDim) * 0.75;
    geometry.scale(scale, scale, scale);

    geometry.computeBoundingBox();
    geometry.boundingBox.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);

    const material = new THREE.MeshToonMaterial({
        color: 0x8A3F44,
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    let targetX = 0, targetY = 0, currentX = 0, currentY = 0;

    // Shared state for hand tracking
    window.handState = { pinching: false, targetRotX: 0, targetRotY: 0, currentRotX: 0, currentRotY: 0 };

    document.addEventListener('mousemove', (e) => {
        if (!window.handState.pinching) {
            targetY = ((e.clientX / window.innerWidth) * 2 - 1) * 0.1;
            targetX = -((e.clientY / window.innerHeight) * 2 - 1) * 0.1;
        }
    });

    (function animate() {
        requestAnimationFrame(animate);
        if (window.handState.pinching) {
            targetX = window.handState.targetRotX;
            targetY = window.handState.targetRotY;
        }
        currentX += (targetX - currentX) * 0.06;
        currentY += (targetY - currentY) * 0.06;
        mesh.rotation.x = currentX;
        mesh.rotation.y = currentY;
        window.handState.currentRotX = currentX;
        window.handState.currentRotY = currentY;
        renderer.render(scene, camera);
    })();
}

<script>
    const animationContainer = document.querySelector('.animation-container');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');

    document.getElementById('timestamp').innerHTML = `[${getCurrentTime()}]&nbsp;`;

    function getCurrentTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    }

    function escapeHtml(value) {
        return value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function playStatusSound() {
        const sound = document.getElementById('statusSound');
        sound.volume = 0.8;
        sound.play();
    }

    let keyListenerEnabled = true;
    let revertTimeout;

    function renderSystemStatus(message, allowHtml = false) {
        const existingStatus = animationContainer.querySelector('.system-status');
        if (existingStatus) {
            existingStatus.classList.add('delayed-fade-out');
            existingStatus.addEventListener('animationend', function () {
                if (existingStatus.parentNode === animationContainer) {
                    animationContainer.removeChild(existingStatus);
                }
            }, { once: true });
        }

        const newStatus = document.createElement('p');
        newStatus.className = 'fade-in-text system-status';
        const renderedMessage = allowHtml ? message : escapeHtml(message);
        newStatus.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${renderedMessage}`;
        animationContainer.insertBefore(newStatus, animationContainer.firstChild);
        playStatusSound();
    }

    function appendUserMessage(message) {
        const newMessage = document.createElement('p');
        newMessage.className = 'fade-in-text message-status';
        newMessage.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${escapeHtml(message)}`;
        animationContainer.appendChild(newMessage);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    document.addEventListener('keydown', function (event) {
        if (event.target === messageInput || !keyListenerEnabled) {
            return;
        }

        renderSystemStatus(' You are no longer away.');
        keyListenerEnabled = false;

        clearTimeout(revertTimeout);
        revertTimeout = setTimeout(() => {
            renderSystemStatus('You are now away: AFK<span class="blinking-cursor"> ></span>', true);
            keyListenerEnabled = true;
        }, 10000);
    });

    messageForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const message = messageInput.value.trim();
        if (!message) {
            return;
        }

        appendUserMessage(message);
        messageInput.value = '';
        messageInput.focus();
    });
</script>

<script>
(function() {
    const indicator  = document.getElementById('hand-indicator');
    const dot        = document.getElementById('hand-dot');
    const label      = document.getElementById('hand-label');
    const videoEl    = document.getElementById('hand-video');

    function setStatus(state) {
        indicator.style.opacity = '1';
        if (state === 'off')      { dot.style.background = '#9b8f88'; label.textContent = 'camera off'; }
        if (state === 'ready')    { dot.style.background = '#9b8f88'; label.textContent = 'no hand'; }
        if (state === 'detected') { dot.style.background = '#deea4c'; label.textContent = 'hand detected'; }
        if (state === 'pinching') { dot.style.background = '#8A3F44'; label.textContent = 'pinching'; }
    }

    let wasPinching   = false;
    let pinchStartX   = 0, pinchStartY   = 0;
    let baseRotX      = 0, baseRotY      = 0;

    function getPinchMidpoint(lm) {
        return { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };
    }

    function onResults(results) {
        if (!window.handState) return;

        const lms = results.multiHandLandmarks;
        if (!lms || lms.length === 0) {
            window.handState.pinching = false;
            wasPinching = false;
            setStatus('ready');
            return;
        }

        const lm = lms[0];
        setStatus('detected');

        const dx = lm[4].x - lm[8].x;
        const dy = lm[4].y - lm[8].y;
        const pinchDist = Math.sqrt(dx * dx + dy * dy);
        const pinching  = pinchDist < 0.06;

        if (pinching) {
            setStatus('pinching');
            const mid = getPinchMidpoint(lm);
            if (!wasPinching) {
                pinchStartX = mid.x;
                pinchStartY = mid.y;
                baseRotX    = window.handState.currentRotX;
                baseRotY    = window.handState.currentRotY;
                wasPinching = true;
            }
            const sensitivity = 4;
            window.handState.targetRotX = baseRotX - (mid.y - pinchStartY) * sensitivity;
            window.handState.targetRotY = baseRotY - (mid.x - pinchStartX) * sensitivity;
            window.handState.pinching   = true;
        } else {
            if (wasPinching) wasPinching = false;
            window.handState.pinching = false;
        }
    }

    function init() {
        if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
            setTimeout(init, 200);
            return;
        }

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const cam = new Camera(videoEl, {
            onFrame: async () => { await hands.send({ image: videoEl }); },
            width: 320, height: 240
        });

        cam.start().then(() => setStatus('ready')).catch(() => setStatus('off'));
    }

    init();
})();
</script>
