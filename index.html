<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="stylesheet" href="style.css">
    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            position: relative;
            min-height: 100vh;
        }

        #dust-canvas {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            display: block;
            pointer-events: none;
            z-index: 3;
            opacity: 0.85;
            mix-blend-mode: screen;
        }

        .video-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            height: 100svh;
        }

        .status-panel,
        #hand-indicator {
            position: relative;
            z-index: 4;
        }
    </style>
    <title>afk</title>
</head>
<body>
 
<!-- Add the audio element for the sound -->
    <audio id="statusSound">
        <!-- Replace 'your-sound.mp3' with the actual file name and path -->
        <source src="sources/message.mp3" type="audio/mp3">
        Your browser does not support the audio tag.
    </audio>

<div class="video-container">
        <canvas id="d-canvas"></canvas>
    </div>
<canvas id="dust-canvas" aria-hidden="true"></canvas>

<div class="status-panel">
    <div class="animation-container">
        <p id="status" class="fade-in-text system-status">
            <span id="timestamp" class="timestamp-text"></span>
            You are now away: AFK<span class="blinking-cursor"> ></span>
        </p>
    </div>

    <form class="message-compose" id="messageForm" autocomplete="off">
        <input id="messageInput" class="message-input" type="text" name="message" maxlength="140" placeholder="Type a message..." aria-label="Type a message">
        <button class="message-send" type="submit">send</button>
    </form>
</div>

<script type="importmap">{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "opentype": "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.module.js"
  }
}</script>

<script type="module">
import * as THREE from 'three';
import * as opentype from 'opentype';

const canvas = document.getElementById('d-canvas');
const size = Math.min(window.innerWidth, window.innerHeight) * 0.35;
canvas.width = size;
canvas.height = size;
canvas.style.width = `${size}px`;
canvas.style.height = `${size}px`;
canvas.style.display = 'block';

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(size, size);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
camera.position.z = 5;

const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const keyLight = new THREE.DirectionalLight(0xffffff, 2.0);
keyLight.position.set(3, 4, 5);
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8A3F44, 1.0);
fillLight.position.set(-4, -2, 2);
scene.add(fillLight);

function opentypePathToShapes(otPath) {
    const shapePath = new THREE.ShapePath();
    for (const cmd of otPath.commands) {
        switch (cmd.type) {
            case 'M': shapePath.moveTo(cmd.x, -cmd.y); break;
            case 'L': shapePath.lineTo(cmd.x, -cmd.y); break;
            case 'C': shapePath.bezierCurveTo(cmd.x1, -cmd.y1, cmd.x2, -cmd.y2, cmd.x, -cmd.y); break;
            case 'Q': shapePath.quadraticCurveTo(cmd.x1, -cmd.y1, cmd.x, -cmd.y); break;
            case 'Z': shapePath.currentPath.autoClose = true; break;
        }
    }
    return shapePath.toShapes(true);
}

let mesh;
try {
    const fontResponse = await fetch('./sources/edge.ttf');
    if (!fontResponse.ok) {
        throw new Error(`Font request failed with ${fontResponse.status}`);
    }

    const fontBuffer = await fontResponse.arrayBuffer();
    const font = opentype.parse(fontBuffer);
    const glyph = font.charToGlyph('D');
    const otPath = glyph.getPath(0, 0, 200);
    const shapes = opentypePathToShapes(otPath);

    const geometry = new THREE.ExtrudeGeometry(shapes, {
        depth: 30,
        bevelEnabled: true,
        bevelThickness: 3,
        bevelSize: 2,
        bevelSegments: 6,
        curveSegments: 16
    });

    geometry.computeBoundingBox();
    const center = new THREE.Vector3();
    geometry.boundingBox.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);

    const bbox = geometry.boundingBox;
    const maxDim = Math.max(bbox.max.x - bbox.min.x, bbox.max.y - bbox.min.y);
    const scale = (4 / maxDim) * 0.75;
    geometry.scale(scale, scale, scale);

    geometry.computeBoundingBox();
    geometry.boundingBox.getCenter(center);
    geometry.translate(-center.x, -center.y, -center.z);

    const material = new THREE.MeshToonMaterial({
        color: 0x8A3F44
    });

    mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);
} catch (error) {
    console.error('EDGE font render failed, falling back to simple D shape.', error);

    const fallbackShape = new THREE.Shape();
    fallbackShape.moveTo(-1.1, -1.45);
    fallbackShape.lineTo(-1.1, 1.45);
    fallbackShape.lineTo(0.05, 1.45);
    fallbackShape.bezierCurveTo(1.15, 1.45, 1.95, 0.88, 2.22, 0);
    fallbackShape.bezierCurveTo(1.95, -0.88, 1.15, -1.45, 0.05, -1.45);
    fallbackShape.lineTo(-1.1, -1.45);

    const hole = new THREE.Path();
    hole.moveTo(-0.5, -0.85);
    hole.lineTo(-0.5, 0.85);
    hole.lineTo(0.02, 0.85);
    hole.bezierCurveTo(0.82, 0.85, 1.28, 0.42, 1.45, 0);
    hole.bezierCurveTo(1.28, -0.42, 0.82, -0.85, 0.02, -0.85);
    hole.lineTo(-0.5, -0.85);
    fallbackShape.holes.push(hole);

    const fallbackGeometry = new THREE.ExtrudeGeometry(fallbackShape, {
        depth: 0.85,
        bevelEnabled: true,
        bevelThickness: 0.14,
        bevelSize: 0.1,
        bevelSegments: 10,
        curveSegments: 48
    });
    fallbackGeometry.center();

    const fallbackMaterial = new THREE.MeshToonMaterial({
        color: 0x8A3F44
    });

    mesh = new THREE.Mesh(fallbackGeometry, fallbackMaterial);
    mesh.rotation.x = -0.08;
    mesh.rotation.y = -0.18;
    scene.add(mesh);
}

let targetX = mesh.rotation.x;
let targetY = mesh.rotation.y;
let currentX = mesh.rotation.x;
let currentY = mesh.rotation.y;

window.handState = { pinching: false, targetRotX: currentX, targetRotY: currentY, currentRotX: currentX, currentRotY: currentY };

document.addEventListener('mousemove', (e) => {
    if (!window.handState.pinching) {
        targetY = ((e.clientX / window.innerWidth) * 2 - 1) * 0.1;
        targetX = -((e.clientY / window.innerHeight) * 2 - 1) * 0.1;
    }
});

window.addEventListener('resize', () => {
    const nextSize = Math.min(window.innerWidth, window.innerHeight) * 0.35;
    canvas.width = nextSize;
    canvas.height = nextSize;
    canvas.style.width = `${nextSize}px`;
    canvas.style.height = `${nextSize}px`;
    renderer.setSize(nextSize, nextSize, false);
});

(function animate() {
    requestAnimationFrame(animate);
    if (window.handState.pinching) {
        targetX = window.handState.targetRotX;
        targetY = window.handState.targetRotY;
    }
    currentX += (targetX - currentX) * 0.06;
    currentY += (targetY - currentY) * 0.06;
    mesh.rotation.x = currentX;
    mesh.rotation.y = currentY;
    window.handState.currentRotX = currentX;
    window.handState.currentRotY = currentY;
    renderer.render(scene, camera);
})();
</script>

<script>
(() => {
    const canvas = document.getElementById('dust-canvas');
    const context = canvas.getContext('2d');
    const particles = [];
    const depthBands = [
        { count: 24, radius: [2.4, 5.2], speed: [0.018, 0.045], alpha: [0.07, 0.14], blur: 16, drift: 0.11 },
        { count: 34, radius: [1.3, 2.9], speed: [0.012, 0.03], alpha: [0.045, 0.095], blur: 8, drift: 0.07 },
        { count: 44, radius: [0.7, 1.8], speed: [0.005, 0.018], alpha: [0.025, 0.055], blur: 1, drift: 0.04 }
    ];

    function randomBetween(min, max) {
        return min + Math.random() * (max - min);
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    function seedParticle(band, bandIndex, initial = false) {
        return {
            bandIndex,
            x: randomBetween(0, canvas.width),
            y: initial ? randomBetween(0, canvas.height) : canvas.height + randomBetween(10, 120),
            radius: randomBetween(band.radius[0], band.radius[1]),
            speedY: randomBetween(band.speed[0], band.speed[1]),
            drift: randomBetween(-band.drift, band.drift),
            alpha: randomBetween(band.alpha[0], band.alpha[1]),
            blur: band.blur,
            wobble: randomBetween(0.2, 1.1),
            wobbleOffset: randomBetween(0, Math.PI * 2)
        };
    }

    function rebuildParticles() {
        particles.length = 0;
        depthBands.forEach((band, bandIndex) => {
            for (let index = 0; index < band.count; index += 1) {
                particles.push(seedParticle(band, bandIndex, true));
            }
        });
    }

    function drawParticle(particle, time) {
        const offsetX = Math.sin((time * 0.00008 * particle.wobble) + particle.wobbleOffset) * 10;
        context.beginPath();
        context.filter = particle.blur ? `blur(${particle.blur}px)` : 'none';
        context.fillStyle = `rgba(244, 236, 214, ${particle.alpha})`;
        context.arc(particle.x + offsetX, particle.y, particle.radius, 0, Math.PI * 2);
        context.fill();
    }

    function animate(time) {
        context.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((currentParticle, index) => {
            let particle = currentParticle;
            particle.y -= particle.speedY;
            particle.x += particle.drift;

            if (particle.y < -40 || particle.x < -60 || particle.x > canvas.width + 60) {
                const band = depthBands[particle.bandIndex];
                particles[index] = seedParticle(band, particle.bandIndex, false);
                particle = particles[index];
            }

            drawParticle(particle, time);
        });
        context.filter = 'none';
        requestAnimationFrame(animate);
    }

    resizeCanvas();
    rebuildParticles();
    window.addEventListener('resize', () => {
        resizeCanvas();
        rebuildParticles();
    });
    requestAnimationFrame(animate);
})();
</script>

<script>
    const animationContainer = document.querySelector('.animation-container');
    const messageForm = document.getElementById('messageForm');
    const messageInput = document.getElementById('messageInput');

    document.getElementById('timestamp').innerHTML = `[${getCurrentTime()}]&nbsp;`;

    function getCurrentTime() {
        const now = new Date();
        const hours = now.getHours().toString().padStart(2, '0');
        const minutes = now.getMinutes().toString().padStart(2, '0');
        const seconds = now.getSeconds().toString().padStart(2, '0');
        return `${hours}:${minutes}:${seconds}`;
    }

    function escapeHtml(value) {
        return value
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function playStatusSound() {
        const sound = document.getElementById('statusSound');
        sound.volume = 0.8;
        sound.play();
    }

    const awayMessageHtml = 'You are now away: AFK<span class="blinking-cursor"> ></span>';
    const activeMessage = 'You are no longer away.';
    const inactivityDelayMs = 20000;
    let inactivityTimeout;
    let isAway = true;

    function appendSystemMessage(message, allowHtml = false) {
        const newStatus = document.createElement('p');
        newStatus.className = 'fade-in-text system-status';
        const renderedMessage = allowHtml ? message : escapeHtml(message);
        newStatus.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${renderedMessage}`;
        animationContainer.appendChild(newStatus);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    function appendUserMessage(message) {
        const newMessage = document.createElement('p');
        newMessage.className = 'fade-in-text message-status';
        newMessage.innerHTML = `<span class="timestamp-text" style="color: #9b8f88;">[${getCurrentTime()}]</span> ${escapeHtml(message)}`;
        animationContainer.appendChild(newMessage);
        animationContainer.scrollTop = animationContainer.scrollHeight;
        playStatusSound();
    }

    function scheduleAwayStatus() {
        clearTimeout(inactivityTimeout);
        inactivityTimeout = setTimeout(() => {
            if (isAway) {
                return;
            }

            appendSystemMessage(awayMessageHtml, true);
            isAway = true;
        }, inactivityDelayMs);
    }

    function markUserActive() {
        if (isAway) {
            appendSystemMessage(activeMessage);
            isAway = false;
        }

        scheduleAwayStatus();
    }

    messageInput.addEventListener('focus', function () {
        markUserActive();
    });

    messageInput.addEventListener('input', function () {
        markUserActive();
    });

    messageForm.addEventListener('submit', function (event) {
        event.preventDefault();

        const message = messageInput.value.trim();
        if (!message) {
            return;
        }

        markUserActive();
        appendUserMessage(message);
        messageInput.value = '';
        messageInput.focus();
    });
</script>

<!-- Hand tracking indicator -->
<div id="hand-indicator" style="
    position: fixed; bottom: 50px; right: 50px;
    font-family: 'Arial Narrow', sans-serif;
    font-size: 14px; color: #9b8f88;
    background: rgba(255,255,255,0.05);
    padding: 8px 14px; border-radius: 4px;
    display: flex; align-items: center; gap: 8px;
    opacity: 0; transition: opacity 0.4s;
">
    <span id="hand-dot" style="width:8px;height:8px;border-radius:50%;background:#9b8f88;display:inline-block;transition:background 0.2s;"></span>
    <span id="hand-label">camera off</span>
</div>

<!-- Hidden video for webcam -->
<video id="hand-video" style="display:none;" playsinline></video>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>

<script>
(function() {
    const indicator  = document.getElementById('hand-indicator');
    const dot        = document.getElementById('hand-dot');
    const label      = document.getElementById('hand-label');
    const videoEl    = document.getElementById('hand-video');

    function setStatus(state) {
        indicator.style.opacity = '1';
        if (state === 'off')      { dot.style.background = '#9b8f88'; label.textContent = 'camera off'; }
        if (state === 'ready')    { dot.style.background = '#9b8f88'; label.textContent = 'no hand'; }
        if (state === 'detected') { dot.style.background = '#deea4c'; label.textContent = 'hand detected'; }
        if (state === 'pinching') { dot.style.background = '#8A3F44'; label.textContent = 'pinching'; }
    }

    let wasPinching   = false;
    let pinchStartX   = 0, pinchStartY   = 0;
    let baseRotX      = 0, baseRotY      = 0;

    function getPinchMidpoint(lm) {
        return { x: (lm[4].x + lm[8].x) / 2, y: (lm[4].y + lm[8].y) / 2 };
    }

    function onResults(results) {
        if (!window.handState) return;

        const lms = results.multiHandLandmarks;
        if (!lms || lms.length === 0) {
            window.handState.pinching = false;
            wasPinching = false;
            setStatus('ready');
            return;
        }

        const lm = lms[0];
        setStatus('detected');

        const dx = lm[4].x - lm[8].x;
        const dy = lm[4].y - lm[8].y;
        const pinchDist = Math.sqrt(dx * dx + dy * dy);
        const pinching  = pinchDist < 0.06;

        if (pinching) {
            setStatus('pinching');
            const mid = getPinchMidpoint(lm);
            if (!wasPinching) {
                pinchStartX = mid.x;
                pinchStartY = mid.y;
                baseRotX    = window.handState.currentRotX;
                baseRotY    = window.handState.currentRotY;
                wasPinching = true;
            }
            const sensitivity = 4;
            window.handState.targetRotX = baseRotX - (mid.y - pinchStartY) * sensitivity;
            window.handState.targetRotY = baseRotY - (mid.x - pinchStartX) * sensitivity;
            window.handState.pinching   = true;
        } else {
            if (wasPinching) wasPinching = false;
            window.handState.pinching = false;
        }
    }

    function init() {
        if (typeof Hands === 'undefined' || typeof Camera === 'undefined') {
            setTimeout(init, 200);
            return;
        }

        const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}` });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
        hands.onResults(onResults);

        const cam = new Camera(videoEl, {
            onFrame: async () => { await hands.send({ image: videoEl }); },
            width: 320, height: 240
        });

        cam.start().then(() => setStatus('ready')).catch(() => setStatus('off'));
    }

    init();
})();
</script>
